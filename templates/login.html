{% extends "base.html" %}

{% block content %}
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4 bg-gray-900">
    <div class="bg-gray-800 rounded-lg shadow-xl p-8 w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-file-invoice text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-blue-500 mb-2">CotiFácil</h1>
            <p class="text-gray-400">Sistema de Gestión de Cotizaciones</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium mb-2 text-gray-300">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                       placeholder="admin@cotifacil.com" required value="admin@cotifacil.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2 text-gray-300">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                       placeholder="********" required value="admin123">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                    <label for="remember" class="ml-2 text-sm text-gray-300">Recordarme</label>
                </div>
                <a href="#" class="text-sm text-blue-500 hover:text-blue-400 transition duration-200">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                <i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesión
            </button>
        </form>

        <div id="login-message" class="mt-6 p-3 rounded-lg text-center hidden"></div>

        <div class="mt-6 p-4 bg-gray-700 rounded-lg">
            <p class="text-sm text-center text-gray-300">
                <strong>Credenciales de prueba:</strong><br>
                📧 Email: admin@cotifacil.com<br>
                🔑 Password: admin123
            </p>
        </div>
    </div>
</div>

<script>
// Función específica para el login
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('login-form');
    const messageDiv = document.getElementById('login-message');

    if (loginForm) {
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;

            // Mostrar loading
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Iniciando sesión...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('✅ ¡Login exitoso! Redirigiendo...', 'success', messageDiv);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('❌ ' + (data.message || 'Credenciales incorrectas'), 'error', messageDiv);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showMessage('❌ Error de conexión con el servidor', 'error', messageDiv);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    }
});

function showMessage(message, type, element) {
    if (element) {
        element.textContent = message;
        element.className = `p-3 rounded-lg text-center font-medium ${
            type === 'error' ? 'bg-red-900 text-red-100' : 'bg-green-900 text-green-100'
        }`;
        element.classList.remove('hidden');

        setTimeout(() => {
            element.classList.add('hidden');
        }, 4000);
    }
}
</script>
{% endblock %}
